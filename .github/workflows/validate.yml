name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: home-assistant/actions/hassfest@master  # intentional floating ref; HA team's canonical recommendation

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: HACS Action
        uses: hacs/action@main  # intentional floating ref; HACS maintainers' canonical recommendation
        with:
          category: integration
