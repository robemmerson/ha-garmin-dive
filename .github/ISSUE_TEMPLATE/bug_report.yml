name: Bug report
description: Something doesn't work as expected.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the problem.
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: 2026.1.0
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: ha-garmin-dive version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: text
